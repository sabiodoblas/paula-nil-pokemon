<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isla Pelele TCG Collection</title>
  <style>
    /* --- POKÉMON TCG MOBILE LOOK & FEEL (Estil Neumòrfic i Premium) --- */
    :root {
      --bg-app: #eef2f7;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --shadow-light: -6px -6px 12px #ffffff;
      --shadow-dark: 6px 6px 12px #d1d9e6;
      --shadow-inset-light: inset -4px -4px 8px #ffffff;
      --shadow-inset-dark: inset 4px 4px 8px #d1d9e6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hidden { display: none !important; }

    /* --- PANTALLA 1: QUI ETS? (DISSENY PREMIUM AMB CARTES) --- */
    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-header h1 {
      font-size: 36px;
      font-weight: 900;
      font-style: italic;
      color: #0f172a;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      font-size: 18px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .selector-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 30px;
      max-width: 640px;
      width: 100%;
      padding: 10px;
    }

    @media (max-width: 500px) {
      .selector-container {
        grid-template-columns: 1fr;
        gap: 40px;
        max-width: 280px;
      }
    }

    .char-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      group;
    }

    .char-card-box {
      width: 100%;
      aspect-ratio: 2.5 / 3.5;
      border-radius: 16px;
      box-shadow: 0 20px 35px rgba(15, 23, 42, 0.15);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
      border: 2px solid transparent;
    }

    .char-card-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .char-option:hover .char-card-box {
      transform: scale(1.06) translateY(-10px);
      box-shadow: 0 30px 50px rgba(15, 23, 42, 0.25);
      border-color: #3b82f6;
    }

    .char-label {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
      background: white;
      padding: 12px 28px;
      border-radius: 20px;
      box-shadow: var(--shadow-dark);
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .char-option:hover .char-label {
      background: #3b82f6;
      color: white;
      transform: translateY(-2px);
    }

    /* --- PANTALLA 2: SOBRE / BOOSTER PACK --- */
    #pack-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .collection-title {
      font-size: 38px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #06b6d4 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 35px;
      text-align: center;
    }

    .booster-pack {
      position: relative;
      width: 250px;
      height: 380px;
      background: linear-gradient(180deg, #06b6d4 0%, #0d9488 50%, #1d4ed8 100%);
      border-radius: 20px;
      box-shadow: 15px 15px 30px #b8c4d4, -15px -15px 30px #ffffff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 26px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .booster-pack:hover { transform: scale(1.04) translateY(-5px); }
    .booster-pack::before {
      content: ''; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg); transition: 0.6s;
    }
    .booster-pack:hover::before { left: 150%; }

    .booster-pack::after, .pack-crimped-bottom {
      content: ''; position: absolute; left: 0; right: 0; height: 10px;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
    }
    .booster-pack::after { top: 0; }
    .pack-crimped-bottom { bottom: 0; }

    .pack-header { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.8); letter-spacing: 1.5px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; text-transform: uppercase;}
    .pack-logo { margin: auto 0; text-align: center; color: white; }
    .pack-logo .main { font-size: 46px; font-weight: 900; letter-spacing: -2px; display: block; line-height: 40px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .pack-logo .sub { font-size: 24px; font-weight: 800; color: #fde047; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .pack-footer { background: rgba(255, 255, 255, 0.15); color: white; text-align: center; font-size: 12px; font-weight: 700; padding: 10px; border-radius: 12px; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.1); }

    /* --- PANTALLA 3: ÀLBUM DE CROMOS --- */
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(238, 242, 247, 0.85);
      backdrop-filter: blur(14px);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(30, 41, 59, 0.06);
    }
    header span { font-size: 11px; font-weight: 800; color: #0284c7; text-transform: uppercase; letter-spacing: 1px; }
    header h2 { font-size: 20px; font-weight: 800; color: var(--text-main); }
    
    .badge-trainer {
      background: white; padding: 10px 18px; border-radius: 24px; font-size: 13px; font-weight: 700;
      box-shadow: var(--shadow-dark), var(--shadow-light); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.7);
    }
    .badge-trainer strong { color: #0f172a; font-weight: 800; }

    .grid-container {
      max-width: 1200px; width: 100%; margin: 30px auto; padding: 0 24px;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
    }
    @media(min-width: 550px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
    @media(min-width: 850px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
    @media(min-width: 1050px) { .grid-container { grid-template-columns: repeat(5, 1fr); } }

    .card-wrapper { display: flex; flex-direction: column; align-items: center; }

    /* --- MOTOR D'ANIMACIÓ 3D POKÉMON --- */
    .card-3d-box { width: 100%; aspect-ratio: 2.5 / 3.5; perspective: 1200px; cursor: pointer; }
    .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
    .card-inner.unlocked { transform: rotateY(180deg); }
    .card-face { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 16px; box-shadow: 6px 10px 18px rgba(163, 177, 198, 0.45); overflow: hidden; }

    .card-back { background: #1e3a8a; border: 5px solid #f59e0b; display: flex; flex-direction: column; justify-content: space-between; padding: 14px; }
    .card-back::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle, rgba(56, 189, 248, 0.25) 0%, transparent 75%); }
    .back-logo { width: 46px; height: 46px; border-radius: 50%; border: 3px solid #f59e0b; margin: auto; background: #172554; box-shadow: inset 0 0 12px rgba(0,0,0,0.6); }
    .back-text-top { text-align: center; font-size: 9px; font-weight: 800; color: #f59e0b; letter-spacing: 1.5px; }
    .back-text-num { text-align: center; font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; }

    .card-front { background: white; transform: rotateY(180deg); border: 1px solid #e2e8f0; }
    .card-front img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-name-label { margin-top: 10px; font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; text-align: center; }

    /* --- MODAL DIÀLEG POPUP --- */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(5px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.25s ease-out forwards; }
    .modal-content { background: white; border-radius: 28px; padding: 28px; max-width: 320px; width: 100%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.8); transform: scale(0.95); animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .modal-icon { width: 52px; height: 52px; background: #ecfeff; color: #06b6d4; font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin: 0 auto 18px; }
    .modal-content h3 { font-size: 19px; font-weight: 800; margin-bottom: 6px; color: #0f172a; }
    .modal-content p { font-size: 15px; color: var(--text-muted); margin-bottom: 26px; font-weight: 500; }
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-modal { padding: 14px; border: none; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-no { background: #f1f5f9; color: #64748b; }
    .btn-no:hover { background: #e2e8f0; }
    .btn-si { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); color: white; box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25); }
    .btn-si:hover { opacity: 0.95; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleUp { from { transform: scale(0.9); } to { transform: scale(1); } }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-header">
      <h1>Benvinguts a Isla Pelele - TCG</h1>
      <p>Vols començar? Qui ets?</p>
    </div>
    
    <div class="selector-container">
      <div class="char-option" onclick="selectUser('Paula')">
        <div class="char-card-box">
          <img src="Cromo_Martí.jpg" alt="Entrenadora Paula">
        </div>
        <div class="char-label">Tria la Paula</div>
      </div>

      <div class="char-option" onclick="selectUser('Nil')">
        <div class="char-card-box">
          <img src="Cromo_Nil.jpg" alt="Entrenador Nil">
        </div>
        <div class="char-label">Tria el Nil</div>
      </div>
    </div>
  </div>

  <div id="pack-screen" class="hidden">
    <h1 class="collection-title">Isla Pelele</h1>
    <div class="booster-pack" onclick="openCollection()">
      <div class="pack-header">Personal TCG Extension</div>
      <div class="pack-logo">
        <span class="main">ISLA</span>
        <span class="sub">Pelele</span>
      </div>
      <div class="pack-footer">Toca per Obrir la Col·lecció</div>
      <div class="pack-crimped-bottom"></div>
    </div>
  </div>

  <div id="binder-screen" class="hidden">
    <header>
      <div>
        <span>Col·lecció Actual</span>
        <h2>Isla Pelele</h2>
      </div>
      <div class="badge-trainer">Entrenador: <strong id="trainer-name">Paula</strong></div>
    </header>

    <main class="grid-container" id="cards-grid">
      </main>
  </div>

  <div id="unlock-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-icon">?</div>
      <h3>Desbloquejar Carta</h3>
      <p>Vols desbloquejar aquesta carta?</p>
      <div class="modal-actions">
        <button class="btn-modal btn-no" onclick="closeModal()">No</button>
        <button class="btn-modal btn-si" onclick="confirmUnlockCard()">si!</button>
      </div>
    </div>
  </div>

  <script>
    // BASE DE DADES INTERNA AMB ELS 23 CROMOS TOTALS
    const CARD_DATABASE = [
      { id: 1, name: "Machop",     number: "", artworkUrl: "Cromo_Adri.jpg" },
      { id: 2, name: "Charmander", number: "", artworkUrl: "Cromo_Alcober.jpg" },
      { id: 3, name: "Chikorita",  number: "", artworkUrl: "Cromo_Andrea.jpg" },
      { id: 4, name: "Kecleon",    number: "", artworkUrl: "Cromo_Bosch.jpg" },
      { id: 5, name: "Cubone",     number: "", artworkUrl: "Cromo_Carles.jpg" },
      { id: 6, name: "Doduo",      number: "", artworkUrl: "Cromo_Dani.jpg" },
      { id: 7, name: "Diglet",     number: "", artworkUrl: "Cromo_Edu.jpg" },
      { id: 8, name: "Vulpix",     number: "", artworkUrl: "Cromo_Elsa.jpg" },
      { id: 9, name: "Whiscash",   number: "", artworkUrl: "Cromo_Eric.jpg" },
      { id: 10, name: "Kleavor",   number: "", artworkUrl: "Cromo_Font.jpg" },
      { id: 11, name: "Snorlax",   number: "", artworkUrl: "Cromo_Jon.jpg" },
      { id: 12, name: "Jigglypuf", number: "", artworkUrl: "Cromo_Juls.jpg" },
      { id: 13, name: "Togepi",    number: "", artworkUrl: "Cromo_Katya.jpg" },
      { id: 14, name: "Komala",    number: "", artworkUrl: "Cromo_Laia.jpg" },
      { id: 15, name: "Chansey",   number: "", artworkUrl: "Cromo_Maria.jpg" },
      { id: 16, name: "Koffing",   number: "", artworkUrl: "Cromo_Pol.jpg" },
      { id: 17, name: "Piplup",    number: "", artworkUrl: "Cromo_Roca.jpg" },
      { id: 18, name: "Wigglytuff",number: "", artworkUrl: "Cromo_Sabaté.jpg" },
      { id: 19, name: "Loudred",   number: "", artworkUrl: "Cromo_Sabio.jpg" },
      { id: 20, name: "Graveler",  number: "", artworkUrl: "Cromo_Sante.jpg" },
      { id: 21, name: "Snorunt",   number: "", artworkUrl: "Cromo_Sara.jpg" },
      { id: 22, name: "Weedle",    number: "", artworkUrl: "Cromo_Velez.jpg" },
      { id: 23, name: "Slowpoke",  number: "", artworkUrl: "Cromo_Xavi.jpg" }
    ];

    // Auto-numeració de les cartes basat en el tamany de la llista
    CARD_DATABASE.forEach((card, index) => {
      const currentNum = String(index + 1).padStart(3, '0');
      const totalNum = String(CARD_DATABASE.length).padStart(3, '0');
      card.number = `${currentNum}/${totalNum}`;
    });

    let currentUser = "";
    let selectedCardId = null;
    const unlockedCardsRegistry = new Set();

    function selectUser(user) {
      currentUser = user;
      document.getElementById('trainer-name').innerText = user;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('pack-screen').classList.remove('hidden');
    }

    function openCollection() {
      document.getElementById('pack-screen').classList.add('hidden');
      document.getElementById('binder-screen').classList.remove('hidden');
      buildCardGrid();
    }

    function buildCardGrid() {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = ""; 

      CARD_DATABASE.forEach(card => {
        const isUnlocked = unlockedCardsRegistry.has(card.id);
        const cardWrapper = document.createElement('div');
        cardWrapper.className = 'card-wrapper';

        cardWrapper.innerHTML = `
          <div class="card-3d-box" onclick="handleCardClick(${card.id})">
            <div class="card-inner ${isUnlocked ? 'unlocked' : ''}" id="card-inner-${card.id}">
              
              <div class="card-face card-back">
                <div class="back-text-top">POKÉMON TCG</div>
                <div class="back-logo"></div>
                <div class="back-text-num">${card.number}</div>
              </div>

              <div class="card-face card-front">
                <img src="${card.artworkUrl}" alt="${card.name}">
              </div>

            </div>
          </div>
          <div class="card-name-label">${card.name}</div>
        `;
        
        grid.appendChild(cardWrapper);
      });
    }

    function handleCardClick(cardId) {
      if (unlockedCardsRegistry.has(cardId)) return;
      
      selectedCardId = cardId;
      document.getElementById('unlock-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('unlock-modal').classList.add('hidden');
      selectedCardId = null;
    }

    function confirmUnlockCard() {
      if (selectedCardId === null) return;

      unlockedCardsRegistry.add(selectedCardId);
      closeModal();

      const targetCardInner = document.getElementById(`card-inner-${selectedCardId}`);
      if (targetCardInner) {
        targetCardInner.classList.add('unlocked');
      }
    }
  </script>
</body>
</html>
