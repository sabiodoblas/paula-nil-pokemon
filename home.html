<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isla Pelele TCG</title>
  <style>
    /* --- TCG PREMIUM MOBILE STYLING (Neumorphic Style) --- */
    :root {
      --bg-color: #eef2f7;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      --shadow-light: -6px -6px 12px #ffffff;
      --shadow-dark: 6px 6px 12px #d1d9e6;
      --shadow-inset-light: inset -4px -4px 8px #ffffff;
      --shadow-inset-dark: inset 4px 4px 8px #d1d9e6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Screen State Engine Helpers */
    .hidden { display: none !important; }

    /* --- SCREEN 1: WHO ARE YOU --- */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: var(--shadow-dark), var(--shadow-light);
      text-align: center;
      max-w-width: 360px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .pokeball-logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(to top right, #f59e0b, #f59e0b);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
    }

    .pokeball-logo::after {
      content: '';
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      border: 4px solid #1e293b;
    }

    .login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .login-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }

    .btn-user {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      color: #475569;
      background-color: var(--bg-color);
      box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-user:hover {
      box-shadow: var(--shadow-inset-dark), var(--shadow-inset-light);
      transform: scale(0.99);
    }

    /* --- SCREEN 2: BOOSTER PACK REVEAL --- */
    #pack-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .collection-title {
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #06b6d4, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
      text-align: center;
    }

    .booster-pack {
      position: relative;
      width: 240px;
      height: 360px;
      background: linear-gradient(180deg, #22d3ee, #14b8a6, #2563eb);
      border-radius: 16px;
      box-shadow: 12px 12px 24px #b8c4d4, -12px -12px 24px #ffffff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      overflow: hidden;
      border: 1px solid #67e8f9;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .booster-pack:hover { transform: scale(1.05); }

    .booster-pack::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-15deg);
      transition: 0.5s;
    }
    .booster-pack:hover::before { left: 150%; }

    .pack-header { font-size: 10px; font-weight: bold; color: white; letter-spacing: 1px; border-b: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; text-transform: uppercase;}
    .pack-logo { margin: auto 0; text-align: center; color: white; text-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    .pack-logo .main { font-size: 42px; font-weight: 900; letter-spacing: -2px; display: block; }
    .pack-logo .sub { font-size: 22px; font-weight: 700; color: #fde047; letter-spacing: 2px; text-transform: uppercase; }
    .pack-footer { background: rgba(0, 0, 0, 0.1); color: rgba(255,255,255,0.9); text-align: center; font-size: 11px; font-weight: 600; padding: 8px; border-radius: 8px; backdrop-filter: blur(4px); }

    /* --- SCREEN 3: APP BINDER HOME --- */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(238, 242, 247, 0.85);
      backdrop-filter: blur(12px);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(30, 41, 59, 0.08);
    }
    header h2 { font-size: 18px; font-weight: 700; }
    header span { font-size: 11px; font-weight: bold; color: #0891b2; text-transform: uppercase; }
    
    .badge-trainer {
      background: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #ffffff;
      color: var(--text-muted);
    }
    .badge-trainer strong { color: var(--text-dark); }

    .grid-container {
      max-width: 900px;
      width: 100%;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media(min-width: 500px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
    @media(min-width: 768px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- 3D CARD GRAPHICS FLIP ENGINE --- */
    .card-3d-box {
      width: 100%;
      aspect-ratio: 2.5 / 3.5;
      perspective: 1000px;
      cursor: pointer;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Flip Trigger Class applied via JavaScript */
    .card-inner.unlocked {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      box-shadow: 6px 6px 12px #b8c4d4;
      overflow: hidden;
    }

    /* Card Backside Pattern */
    .card-back {
      background: #1a305e;
      border: 5px solid #f59e0b;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
    }
    .card-back::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle, rgba(37,99,235,0.2) 0%, transparent 70%);
    }
    .back-logo {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid #f59e0b; margin: auto;
      background: #1e3a8a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }
    .back-text-top { text-align: center; font-size: 8px; font-weight: bold; color: #fbbf24; letter-spacing: 1px; }
    .back-text-num { text-align: center; font-size: 10px; font-weight: bold; color: #94a3b8; }

    /* Card Front View (Unlocked) */
    .card-front {
      background: white;
      transform: rotateY(180deg);
      border: 1px solid #e2e8f0;
    }
    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-name-label {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* --- TCG CONFIRMATION MODAL POPUP --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border-radius: 24px;
      padding: 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .modal-icon {
      width: 48px; height: 48px; background: #ecfeff; color: #06b6d4;
      font-size: 20px; font-weight: bold; display: flex; align-items: center;
      justify-content: center; border-radius: 14px; margin: 0 auto 16px;
    }

    .modal-content h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal-content p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    
    .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    .btn-modal {
      padding: 12px; border: none; border-radius: 14px; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-no { background: #f1f5f9; color: #64748b; }
    .btn-si { background: linear-gradient(135deg, #06b6d4 0%, #2563eb 100%); color: white; }
    .btn-modal:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="pokeball-logo"></div>
      <h1>Benvingut al TCG</h1>
      <p>Qui ets?</p>
      <button class="btn-user" onclick="selectUser('Paula')">Paula</button>
      <button class="btn-user" onclick="selectUser('Nil')">Nil</button>
    </div>
  </div>

  <div id="pack-screen" class="hidden">
    <h1 class="collection-title">Isla Pelele</h1>
    <div class="booster-pack" onclick="openCollection()">
      <div class="pack-header">Personal TCG Extension</div>
      <div class="pack-logo">
        <span class="main">ISLA</span>
        <span class="sub">Pelele</span>
      </div>
      <div class="pack-footer">Toca per Obrir la Col·lecció</div>
    </div>
  </div>

  <div id="binder-screen" class="hidden">
    <header>
      <div>
        <span>Col·lecció Actual</span>
        <h2>Isla Pelele</h2>
      </div>
      <div class="badge-trainer">Entrenador: <strong id="trainer-name">Paula</strong></div>
    </header>

    <main class="grid-container" id="cards-grid">
      </main>
  </div>

  <div id="unlock-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-icon">?</div>
      <h3>Desbloquejar Carta</h3>
      <p>Vols desbloquejar aquesta carta?</p>
      <div class="modal-actions">
        <button class="btn-modal btn-no" onclick="closeModal()">No</button>
        <button class="btn-modal btn-si" onclick="confirmUnlockCard()">si!</button>
      </div>
    </div>
  </div>

  <script>
    // 1. CARDS DATABASE CONFIGURATION
    // Change 'artworkUrl' paths below to your actual image filenames inside your folder.
    // Example: artworkUrl: 'charizard.jpg' or artworkUrl: 'img/pikachu.png'
    const CARD_DATABASE = [
      { id: 1, name: "Pelelechu", number: "001/005", artworkUrl: "https://images.pokemontcg.io/base1/4.png" },
      { id: 2, name: "Nilosaur",  number: "002/005", artworkUrl: "https://images.pokemontcg.io/base1/1.png" },
      { id: 3, name: "Paulafly",  number: "003/005", artworkUrl: "https://images.pokemontcg.io/base1/15.png" },
      { id: 4, name: "Islander",  number: "004/005", artworkUrl: "https://images.pokemontcg.io/base1/5.png" },
      { id: 5, name: "Pelelemew", number: "005/005", artworkUrl: "https://images.pokemontcg.io/base1/16.png" }
    ];

    // App Global Local State Tracking
    let currentUser = "";
    let selectedCardId = null;
    const unlockedCardsRegistry = new Set();

    // 2. STATE MANAGER ROUTING NAVIGATION
    function selectUser(user) {
      currentUser = user;
      document.getElementById('trainer-name').innerText = user;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('pack-screen').classList.remove('hidden');
    }

    function openCollection() {
      document.getElementById('pack-screen').classList.add('hidden');
      document.getElementById('binder-screen').classList.remove('hidden');
      buildCardGrid();
    }

    // 3. GRAPHICS INTERFACE RENDERER ENGINE
    function buildCardGrid() {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = ""; // Clear existing elements

      CARD_DATABASE.forEach(card => {
        const isUnlocked = unlockedCardsRegistry.has(card.id);
        
        const cardWrapper = document.createElement('div');
        cardWrapper.className = 'card-wrapper';

        cardWrapper.innerHTML = `
          <div class="card-3d-box" onclick="handleCardClick(${card.id})">
            <div class="card-inner ${isUnlocked ? 'unlocked' : ''}" id="card-inner-${card.id}">
              
              <div class="card-face card-back">
                <div class="back-text-top">POKÉMON TCG</div>
                <div class="back-logo"></div>
                <div class="back-text-num">${card.number}</div>
              </div>

              <div class="card-face card-front">
                <img src="${card.artworkUrl}" alt="${card.name}">
              </div>

            </div>
          </div>
          <div class="card-name-label">${card.name}</div>
        `;
        
        grid.appendChild(cardWrapper);
      });
    }

    // 4. INTERACTIVE EVENT HANDLERS
    function handleCardClick(cardId) {
      // If card is already flipped/unlocked, do nothing
      if (unlockedCardsRegistry.has(cardId)) return;
      
      selectedCardId = cardId;
      document.getElementById('unlock-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('unlock-modal').classList.add('hidden');
      selectedCardId = null;
    }

    function confirmUnlockCard() {
      if (selectedCardId === null) return;

      // Add to tracking registry dataset state
      unlockedCardsRegistry.add(selectedCardId);
      closeModal();

      // Trigger hardware-accelerated 3D Flip Animation transition via CSS Class Injection
      const targetedCardInnerDOMElement = document.getElementById(`card-inner-${selectedCardId}`);
      if (targetedCardInnerDOMElement) {
        targetedCardInnerDOMElement.classList.add('unlocked');
      }
    }
  </script>
</body>
</html>
